name: Daily Auto-Updater Robot

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC everyday
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pymongo requests
          playwright install chromium

      - name: Run Daily Updater
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python scripts/daily_updater.py

      - name: Notify via GitHub Issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --title "✅ Daily Test Update Complete" --body "Hello @ajaykumarsaroj13-svg! The daily automated robot successfully ran tonight. It fetched new tests from ExamGoal, converted them to Quantrex Academy format, and synced them securely to your MongoDB database." --label "automated-update" || true
